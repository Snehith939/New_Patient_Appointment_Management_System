spring.application.name=patientapp

# Database Configuration
# Change 'your_password_here' to your MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/patient_appointment_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# ddl-auto=update means Hibernate will CREATE tables on first run,
# then ALTER them if you add new fields (safe for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8081

