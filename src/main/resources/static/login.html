<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MediCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="height:100vh;">

  <div class="card p-4" style="width:350px;">

    <h2 class="text-center mb-1">🏥 MediCare</h2>
    <p class="text-center text-muted mb-3" style="font-size:0.85rem;">
      Sign in to your account
    </p>

    <form id="loginForm">

      <input type="email" id="loginEmail" class="form-control mb-2"
             placeholder="Email" required>

      <input type="password" id="loginPassword" class="form-control mb-2"
             placeholder="Password" required>

      <select id="loginRole" class="form-select mb-3" required>
        <option value="" disabled selected hidden>Select Role</option>
        <option value="PATIENT">Patient</option>
        <option value="DOCTOR">Doctor</option>
        <option value="ADMIN">Admin</option>
      </select>

      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        Login
      </button>

    </form>

    <p id="loginMessage" class="mt-2 text-center"></p>

    <p class="text-center mt-3" style="font-size:0.9rem;">
      Don't have an account?
      <a href="register.html">Register</a>
    </p>

  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
