<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MediCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100 py-4">

  <div class="card p-4" style="width:380px;">

    <h2 class="text-center mb-1">🏥 MediCare</h2>
    <p class="text-center text-muted mb-3" style="font-size:0.85rem;">
      Create your account
    </p>

    <form id="registerForm">

      <input type="text" id="name" class="form-control mb-2"
             placeholder="Full Name" required>

      <input type="email" id="email" class="form-control mb-2"
             placeholder="Email" required>

      <input type="password" id="password" class="form-control mb-2"
             placeholder="Password (min 6 characters)" required minlength="6">

      <select id="role" class="form-select mb-2" required>
        <option value="ROLE" disabled selected hidden>Select Role</option>
        <option value="PATIENT">Patient</option>
        <option value="DOCTOR">Doctor</option>
        <option value="ADMIN">Admin</option>
      </select>

      <div class="text-center mb-2" style="font-size:12px;color:#6b7280;">
        Choose role to see required fields
      </div>

      <!-- Dynamic fields appear here based on role -->
      <div id="extraFields" class="mb-2"></div>

      <button type="submit" class="btn btn-primary w-100 mt-2" id="regBtn">
        Register
      </button>

    </form>

    <p id="message" class="mt-2 text-center"></p>

    <p class="text-center mt-3" style="font-size:0.9rem;">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
